<template>
    <lightning-card title="Contacts" icon-name="standard:contact">
        <template if:true={loading}>
            <div class="slds-p-around_medium slds-text-align_center">
                <lightning-spinner alternative-text="Loading contacts" size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:true={error}>
            <div class="slds-p-around_medium">
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                    <span class="slds-assistive-text">Error</span>
                    <span class="slds-icon_container slds-icon-utility-error slds-m-right_x-small" title="Error" aria-hidden="true">
                        <!-- icon placeholder -->
                    </span>
                    <h2>{errorMessage}</h2>
                </div>
            </div>
        </template>

        <template if:true={rows} if:false={loading}>
            <div class="slds-p-around_medium">
                <lightning-datatable
                    key-field="Id"
                    data={rows}
                    columns={columns}
                    hide-checkbox-column
                    draft-values={draftValues}
                    onsave={handleSave}
                >
                </lightning-datatable>
            </div>
        </template>

        <template if:true={noData}>
            <div class="slds-p-around_medium slds-text-color_weak slds-text-align_center">
                No related contacts found.
            </div>
        </template>
    </lightning-card>
</template>
