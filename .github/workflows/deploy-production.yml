name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm production deployment'
        required: true
        type: string

jobs:
  validate-input:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "ERROR: You must type DEPLOY to confirm. Got: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi
          echo "Confirmation accepted. Proceeding with production deployment."

  deploy-production:
    name: Deploy & Test — Production
    runs-on: ubuntu-latest
    needs: validate-input
    environment:
      name: production
      url: ${{ steps.prod-url.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli@latest

      - name: Authenticate Production Org
        run: |
          echo "${{ secrets.SF_PROD_URL }}" > ./prod.url
          sf org login sfdx-url \
            --sfdx-url-file ./prod.url \
            --alias production \
            --set-default
          rm ./prod.url

      - name: Get production org URL
        id: prod-url
        run: |
          URL=$(sf org display --target-org production --json | jq -r '.result.instanceUrl')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Validate deploy (dry run)
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org production \
            --test-level RunLocalTests \
            --wait 30

      - name: Deploy to production
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org production \
            --test-level RunLocalTests \
            --wait 30

      - name: Upload deploy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-deploy-${{ github.sha }}
          path: test-results/
          retention-days: 30

      - name: Post deployment summary
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Org URL:** ${{ steps.prod-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
