name: Validate Pull Request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run prettier:verify

      - name: ESLint
        run: npm run lint

      - name: LWC Jest unit tests
        run: npm run test:unit:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lwc-coverage
          path: coverage/
          retention-days: 7

  scratch-org-validation:
    name: Scratch Org — Apex Tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli@latest

      - name: Authenticate Dev Hub
        run: |
          echo "${{ secrets.SF_DEV_HUB_URL }}" > ./devhub.url
          sf org login sfdx-url \
            --sfdx-url-file ./devhub.url \
            --alias devhub \
            --set-default-dev-hub
          rm ./devhub.url

      - name: Create scratch org
        run: |
          sf org create scratch \
            --definition-file config/project-scratch-def.json \
            --alias pr-${{ github.event.pull_request.number }} \
            --duration-days 1 \
            --set-default \
            --wait 10

      - name: Push source
        run: |
          sf project deploy start \
            --source-dir force-app \
            --wait 20

      - name: Run Apex tests
        run: |
          sf apex run test \
            --test-level RunLocalTests \
            --output-dir ./test-results \
            --result-format tap \
            --wait 20

      - name: Upload Apex test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apex-test-results-pr-${{ github.event.pull_request.number }}
          path: test-results/
          retention-days: 7

      - name: Delete scratch org
        if: always()
        run: |
          sf org delete scratch \
            --target-org pr-${{ github.event.pull_request.number }} \
            --no-prompt
